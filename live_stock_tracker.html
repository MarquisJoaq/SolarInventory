      {

        electricBillRange: '₱4,000.00 - ₱7,000.00',
        inclusions: '3KW Hybrid Inverter, 6x 620W Panels, 1x 100AH Battery, App, Mountings & Safety Devices',
        items: [
          { sku: 'SP-620W-BIFACIAL', quantity: 6 },
          { sku: 'INV-3KW-HYB', quantity: 1 },
          { sku: 'BAT-100AH-51.2V', quantity: 1 },
          { sku: 'CAB-LV-10R', quantity: 1 },
          { sku: 'CAB-LV-10B', quantity: 1 },
          { sku: 'MNT-ALUM-RAIL', quantity: 6 },
          { sku: 'ACC-WIFI-MONITOR', quantity: 1 }
        ]
      }
    ];

    const CATEGORIES = ['All', 'Solar Panels', 'Batteries', 'Inverters', 'Cabling & Wires', 'Mounting & Accessories'];

    // Global variable checks (Injectable environment config or custom settings)
    const presetAppId = typeof __app_id !== 'undefined' ? __app_id : null;
    const presetFbConfig = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
    const presetAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

    // Standard Modular Firebase Initializer block
    let app, auth, db;
    let hasFirebaseConfig = false;
    let initialAppId = 'bright-horizon-jpmc-inventory';

    try {
      const configStr = presetFbConfig || localStorage.getItem('solar_tracker_fb_config');
      if (configStr) {
        const firebaseConfig = typeof configStr === 'string' ? JSON.parse(configStr) : configStr;
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        initialAppId = presetAppId || localStorage.getItem('solar_tracker_app_id') || 'bright-horizon-jpmc-inventory';
        hasFirebaseConfig = true;
      }
    } catch (e) {
      console.error("Firebase startup issues:", e);
      hasFirebaseConfig = false;
    }

    export default function App() {
      const [currentBrand, setCurrentBrand] = useState(() => {
        return localStorage.getItem('solar_tracker_brand') || 'jpmc';
      });

      // Unified React State Management (Initialized with offline standard values)
      const [inventory, setInventory] = useState(INITIAL_INVENTORY);
      const [transactions, setTransactions] = useState([]);

      const [selectedCategory, setSelectedCategory] = useState('All');
      const [selectedBrandFilter, setSelectedBrandFilter] = useState('All');
      const [searchQuery, setSearchQuery] = useState('');
      
      const [showAddModal, setShowAddModal] = useState(false);
      const [showTransactionModal, setShowTransactionModal] = useState(false);
      const [showCloudModal, setShowCloudModal] = useState(false);
      const [selectedItemForTx, setSelectedItemForTx] = useState(null);
      const [txType, setTxType] = useState('IN');
      const [txQuantity, setTxQuantity] = useState('');
      const [txNote, setTxNote] = useState('');

      // Custom GitHub Config Form states
      const [customConfigInput, setCustomConfigInput] = useState(() => {
        const stored = localStorage.getItem('solar_tracker_fb_config');
        return stored ? JSON.stringify(JSON.parse(stored), null, 2) : '';
      });
      const [customAppIdInput, setCustomAppIdInput] = useState(() => {
        return localStorage.getItem('solar_tracker_app_id') || 'bright-horizon-jpmc-inventory';
      });

      const [newItem, setNewItem] = useState({
        name: '', sku: '', brand: 'Canadian Solar', category: 'Solar Panels', quantity: '', minThreshold: '', unit: 'pcs', price: '', location: ''
      });

      const [toast, setToast] = useState(null);
      const [activeTab, setActiveTab] = useState('dashboard');

      // Firebase Sync statuses
      const [user, setUser] = useState(null);
      const [isCloudConnected, setIsCloudConnected] = useState(false);
      const [dbConfig, setDbConfig] = useState({
        hasConfig: hasFirebaseConfig,
        appId: initialAppId
      });

      useEffect(() => {
        localStorage.setItem('solar_tracker_brand', currentBrand);
      }, [currentBrand]);

      const showNotification = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3500);
      };

      // --- FIREBASE LIVE WORKFLOWS (Strict compliance with Rules 1, 2, and 3) ---

      // 1. Initial Authentication sequence
      useEffect(() => {
        if (!dbConfig.hasConfig || !auth) {
          setIsCloudConnected(false);
          return;
        }

        const runAuthentication = async () => {
          let retries = 5;
          let delay = 1000;
          
          while (retries > 0) {
            try {
              if (presetAuthToken) {
                await signInWithCustomToken(auth, presetAuthToken);
              } else {
                await signInAnonymously(auth);
              }
              setIsCloudConnected(true);
              break;
            } catch (err) {
              retries -= 1;
              if (retries === 0) {
                console.error("Firebase auth failed after all retries:", err);
                showNotification("Could not authenticate with global cloud. Running locally.", "error");
                setIsCloudConnected(false);
                break;
              }
              // Exponential backoff
              await new Promise(res => setTimeout(res, delay));
              delay *= 2;
            }
          }
        };

        runAuthentication();

        const unsubscribeAuth = onAuthStateChanged(auth, (authUser) => {
          setUser(authUser);
        });

        return () => unsubscribeAuth();
      }, [dbConfig.hasConfig]);

      // 2. Real-Time Snapshot listening (Public Path isolators)
      useEffect(() => {
        // Fallback to local storage if not authenticated
        if (!isCloudConnected || !db || !user) {
          const savedInv = localStorage.getItem('solar_tracker_inventory');
          const savedTx = localStorage.getItem('solar_tracker_transactions');
          setInventory(savedInv ? JSON.parse(savedInv) : INITIAL_INVENTORY);
          setTransactions(savedTx ? JSON.parse(savedTx) : [
            { id: 'tx-1', date: new Date(Date.now() - 3600000 * 24).toLocaleString(), type: 'IN', sku: 'SP-620W-BIFACIAL', quantity: 50, note: 'Primary import replenishment arrival' },
            { id: 'tx-2', date: new Date(Date.now() - 3600000 * 5).toLocaleString(), type: 'OUT', sku: 'BAT-100AH-51.2V', quantity: 2, note: 'Manila 19.84 KW residential installation' }
          ]);
          return;
        }

        // Live Real-Time Path Bindings (Rule 1 compliance)
        const inventoryCollection = collection(db, 'artifacts', dbConfig.appId, 'public', 'data', 'inventory');
        const transactionsCollection = collection(db, 'artifacts', dbConfig.appId, 'public', 'data', 'transactions');

        // Subscribing to stock collection
        const unsubscribeInventory = onSnapshot(inventoryCollection, (snapshot) => {
          const items = [];
          snapshot.forEach(doc => {
            items.push({ id: doc.id, ...doc.data() });
          });

          if (items.length === 0) {
            // First run setup: initialize central database with flyer defaults
            INITIAL_INVENTORY.forEach(async (defaultItem) => {
              try {
                await setDoc(doc(db, 'artifacts', dbConfig.appId, 'public', 'data', 'inventory', defaultItem.id), defaultItem);
              } catch (e) {
                console.error("Db initialization error:", e);
              }
            });
          } else {
            setInventory(items);
            localStorage.setItem('solar_tracker_inventory', JSON.stringify(items));
          }
        }, (error) => {
          console.error("Firestore read exception:", error);
          showNotification("Synchronization error while fetching stocks.", "error");
        });

        // Subscribing to logged updates collection
        const unsubscribeTransactions = onSnapshot(transactionsCollection, (snapshot) => {
          const loadedTxs = [];
          snapshot.forEach(doc => {
            loadedTxs.push({ id: doc.id, ...doc.data() });
          });

          // Rule 2 client-side memory sorting
          loadedTxs.sort((a, b) => {
            const dateA = new Date(a.date || 0);
            const dateB = new Date(b.date || 0);
            return dateB - dateA;
          });

          setTransactions(loadedTxs);
          localStorage.setItem('solar_tracker_transactions', JSON.stringify(loadedTxs));
        }, (error) => {
          console.error("Firestore transactions subscription failed:", error);
        });

        return () => {
          unsubscribeInventory();
          unsubscribeTransactions();
        };
      }, [isCloudConnected, user, dbConfig.appId]);

      // --- CENTRAL STORAGE WRITERS ---

      const saveInventoryItem = async (updatedItem) => {
        if (isCloudConnected && db) {
          try {
            await setDoc(doc(db, 'artifacts', dbConfig.appId, 'public', 'data', 'inventory', updatedItem.id), updatedItem);
          } catch (e) {
            console.error("Database write failure:", e);
            showNotification("Cloud sync failed. Value remains local.", "error");
          }
        } else {
          setInventory(prev => {
            const next = prev.map(item => item.id === updatedItem.id ? updatedItem : item);
            localStorage.setItem('solar_tracker_inventory', JSON.stringify(next));
            return next;
          });
        }
      };

      const registerNewInventoryItem = async (addedItem) => {
        if (isCloudConnected && db) {
          try {
            await setDoc(doc(db, 'artifacts', dbConfig.appId, 'public', 'data', 'inventory', addedItem.id), addedItem);
          } catch (e) {
            console.error("Database write failure:", e);
            showNotification("Cloud component registration failed.", "error");
          }
        } else {
          setInventory(prev => {
            const next = [...prev, addedItem];
            localStorage.setItem('solar_tracker_inventory', JSON.stringify(next));
            return next;
          });
        }
      };

      const eraseInventoryItem = async (itemId) => {
        if (isCloudConnected && db) {
          try {
            await deleteDoc(doc(db, 'artifacts', dbConfig.appId, 'public', 'data', 'inventory', itemId));
          } catch (e) {
            console.error("Database deletion failure:", e);
          }
        } else {
          setInventory(prev => {
            const next = prev.filter(item => item.id !== itemId);
            localStorage.setItem('solar_tracker_inventory', JSON.stringify(next));
            return next;
          });
        }
      };

      const appendTransactionLog = async (newTx) => {
        if (isCloudConnected && db) {
          try {
            await setDoc(doc(db, 'artifacts', dbConfig.appId, 'public', 'data', 'transactions', newTx.id), newTx);
          } catch (e) {
            console.error("Log database write failure:", e);
          }
        } else {
          setTransactions(prev => {
            const next = [newTx, ...prev];
            localStorage.setItem('solar_tracker_transactions', JSON.stringify(next));
            return next;
          });
        }
      };

      // --- CALCULATED METRICS (JavaScript Client Processing) ---
      const stats = useMemo(() => {
        const totalItems = inventory.reduce((acc, curr) => acc + (parseInt(curr.quantity, 10) || 0), 0);
        const totalValue = inventory.reduce((acc, curr) => acc + ((parseInt(curr.quantity, 10) || 0) * (parseFloat(curr.price) || 0)), 0);
        const lowStockCount = inventory.filter(item => (parseInt(item.quantity, 10) || 0) <= (parseInt(item.minThreshold, 10) || 0)).length;
        const categoryCounts = inventory.reduce((acc, curr) => {
          acc[curr.category] = (acc[curr.category] || 0) + (parseInt(curr.quantity, 10) || 0);
          return acc;
        }, {});
        return { totalItems, totalValue, lowStockCount, categoryCounts };
      }, [inventory]);

      const filteredInventory = useMemo(() => {
        return inventory.filter(item => {
          const matchesCategory = selectedCategory === 'All' || item.category === selectedCategory;
          const matchesBrand = selectedBrandFilter === 'All' || item.brand === selectedBrandFilter;
          const matchesSearch = item.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                item.sku.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                item.location.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                item.brand.toLowerCase().includes(searchQuery.toLowerCase());
          return matchesCategory && matchesBrand && matchesSearch;
        });
      }, [inventory, selectedCategory, selectedBrandFilter, searchQuery]);

      // --- DOM OPERATION HANDLERS ---

      const handleAddNewItem = async (e) => {
        e.preventDefault();
        if (!newItem.name || !newItem.sku || !newItem.quantity || !newItem.price) {
          showNotification('Please fill in all required fields.', 'error');
          return;
        }

        if (inventory.some(item => item.sku.trim().toUpperCase() === newItem.sku.trim().toUpperCase())) {
          showNotification('SKU already exists! Please use a unique identifier.', 'error');
          return;
        }

        const createdItem = {
          id: `item-${Date.now()}`,
          name: newItem.name,
          sku: newItem.sku.toUpperCase(),
          brand: newItem.brand,
          category: newItem.category,
          quantity: parseInt(newItem.quantity, 10),
          minThreshold: parseInt(newItem.minThreshold, 10) || 5,
          unit: newItem.unit || 'pcs',
          price: parseFloat(newItem.price),
          location: newItem.location || 'Warehouse Shelf'
        };

        await registerNewInventoryItem(createdItem);

        const newTx = {
          id: `tx-${Date.now()}`,
          date: new Date().toLocaleString(),
          type: 'IN',
          sku: createdItem.sku,
          quantity: createdItem.quantity,
          note: `Registered new stock component for ${createdItem.brand}`
        };
        await appendTransactionLog(newTx);

        setNewItem({
          name: '', sku: '', brand: 'Canadian Solar', category: 'Solar Panels', quantity: '', minThreshold: '', unit: 'pcs', price: '', location: ''
        });
        setShowAddModal(false);
        showNotification(`Successfully added ${createdItem.name} to logistics database.`);
      };

      const handleTransactionSubmit = async (e) => {
        e.preventDefault();
        if (!selectedItemForTx || !txQuantity) return;

        const qty = parseInt(txQuantity, 10);
        if (qty <= 0) {
          showNotification('Please enter a valid positive quantity.', 'error');
          return;
        }

        const targetItem = inventory.find(i => i.id === selectedItemForTx.id);
        if (!targetItem) return;

        if (txType === 'OUT' && targetItem.quantity < qty) {
          showNotification(`Insufficient stock! Only ${targetItem.quantity} ${targetItem.unit} remaining.`, 'error');
          return;
        }

        const updatedQuantity = txType === 'IN' ? targetItem.quantity + qty : targetItem.quantity - qty;
        await saveInventoryItem({ ...targetItem, quantity: updatedQuantity });

        const newTx = {
          id: `tx-${Date.now()}`,
          date: new Date().toLocaleString(),
          type: txType,
          sku: targetItem.sku,
          quantity: qty,
          note: txNote || `${txType === 'IN' ? 'Stock Added' : 'Stock Issued'}`
        };
        await appendTransactionLog(newTx);

        setShowTransactionModal(false);
        setTxQuantity('');
        setTxNote('');
        showNotification(`Stock ${txType === 'IN' ? 'added' : 'deducted'} successfully for SKU: ${targetItem.sku}`);
      };

      const checkKitAvailability = (kit) => {
        return kit.items.map(kitItem => {
          const invItem = inventory.find(i => i.sku === kitItem.sku);
          return {
            ...kitItem,
            itemName: invItem ? `${invItem.brand} - ${invItem.name}` : 'Unknown Product',
            available: invItem ? invItem.quantity : 0,
            hasSufficient: invItem ? invItem.quantity >= kitItem.quantity : false
          };
        });
      };

      const handleDeployKit = async (kit) => {
        const availability = checkKitAvailability(kit);
        const insufficientItems = availability.filter(a => !a.hasSufficient);

        if (insufficientItems.length > 0) {
          showNotification(`Cannot deploy. Insufficient stock of ${insufficientItems[0].itemName}`, 'error');
          return;
        }

        // Deduct quantities sequential flow
        for (const kitItem of kit.items) {
          const match = inventory.find(i => i.sku === kitItem.sku);
          if (match) {
            await saveInventoryItem({ ...match, quantity: match.quantity - kitItem.quantity });
          }
        }

        // Bulk record operations
        const timestamp = Date.now();
        for (let idx = 0; idx < kit.items.length; idx++) {
          const kitItem = kit.items[idx];
          const newTx = {
            id: `tx-${timestamp}-${idx}`,
            date: new Date().toLocaleString(),
            type: 'OUT',
            sku: kitItem.sku,
            quantity: kitItem.quantity,
            note: `Deployed flyer promo bundle: ${kit.name}`
          };
          await appendTransactionLog(newTx);
        }

        showNotification(`Project package [${kit.name}] successfully deployed. Warehouse stock updated.`);
      };

      const handleSimulation = () => {
        if (inventory.length === 0) return;
        const randItemIndex = Math.floor(Math.random() * inventory.length);
        const item = inventory[randItemIndex];
        const simulationTypes = ['IN', 'OUT'];
        const selectedSimType = simulationTypes[Math.floor(Math.random() * 2)];
        
        let simulatedQty = 0;
        if (item.category === 'Solar Panels') {
          simulatedQty = Math.floor(Math.random() * 10) + 1;
        } else if (item.category === 'Mounting & Accessories') {
          simulatedQty = Math.floor(Math.random() * 25) + 5;
        } else {
          simulatedQty = Math.floor(Math.random() * 2) + 1;
        }

        if (selectedSimType === 'OUT' && item.quantity < simulatedQty) {
          simulateInbound(item, simulatedQty);
        } else if (selectedSimType === 'OUT') {
          simulateOutbound(item, simulatedQty);
        } else {
          simulateInbound(item, simulatedQty);
        }
      };

      const simulateInbound = async (item, qty) => {
        const updatedItem = { ...item, quantity: item.quantity + qty };
        const newTx = {
          id: `tx-sim-${Date.now()}`,
          date: new Date().toLocaleString(),
          type: 'IN',
          sku: item.sku,
          quantity: qty,
          note: 'Simulated replenishment arrival'
        };

        await saveInventoryItem(updatedItem);
        await appendTransactionLog(newTx);
        showNotification(`[Live Sim] Supplier delivered +${qty} ${item.unit} of ${item.sku}`);
      };

      const simulateOutbound = async (item, qty) => {
        const updatedItem = { ...item, quantity: item.quantity - qty };
        const newTx = {
          id: `tx-sim-${Date.now()}`,
          date: new Date().toLocaleString(),
          type: 'OUT',
          sku: item.sku,
          quantity: qty,
          note: 'Simulated dispatch to installation site'
        };

        await saveInventoryItem(updatedItem);
        await appendTransactionLog(newTx);
        showNotification(`[Live Sim] Installed -${qty} ${item.unit} of ${item.sku} at site`);
      };

      const handleDeleteItem = async (id, name) => {
        if (confirm(`Are you sure you want to permanently delete ${name} from tracking?`)) {
          await eraseInventoryItem(id);
          showNotification(`Removed ${name} from database.`);
        }
      };

      const handleResetData = async () => {
        const resetPrompt = isCloudConnected 
          ? 'Are you sure you want to reset the synchronized database? This restores defaults for ALL collaborative users.'
          : 'Are you sure you want to restore the default state? All updates will be reset.';

        if (confirm(resetPrompt)) {
          if (isCloudConnected && db) {
            try {
              // Sequentially reload all base catalog default numbers
              for (const defaultItem of INITIAL_INVENTORY) {
                await setDoc(doc(db, 'artifacts', dbConfig.appId, 'public', 'data', 'inventory', defaultItem.id), defaultItem);
              }
              const txId = `tx-reset-${Date.now()}`;
              const resetTx = {
                id: txId,
                date: new Date().toLocaleString(),
                type: 'IN',
                sku: 'ALL_RESET',
                quantity: 0,
                note: 'Collaborative database reset by administrator'
              };
              await setDoc(doc(db, 'artifacts', dbConfig.appId, 'public', 'data', 'transactions', txId), resetTx);
            } catch (e) {
              console.error("Clean error during manual factory reset:", e);
            }
          } else {
            setInventory(INITIAL_INVENTORY);
            setTransactions([
              { id: 'tx-1', date: new Date().toLocaleString(), type: 'IN', sku: 'SP-620W-BIFACIAL', quantity: 50, note: 'Primary logistics shipment arrival' }
            ]);
            localStorage.setItem('solar_tracker_inventory', JSON.stringify(INITIAL_INVENTORY));
            localStorage.removeItem('solar_tracker_transactions');
          }
          showNotification('Warehouse stock database reset to default config.');
        }
      };

      // --- CUSTOM GITHUB CONFIG SAVE PROCESSOR ---
      const handleSaveCloudSettings = (e) => {
        e.preventDefault();
        try {
          if (!customConfigInput.trim()) {
            localStorage.removeItem('solar_tracker_fb_config');
            localStorage.removeItem('solar_tracker_app_id');
            showNotification('Cloud settings wiped. Reverting to sandbox mode...');
            setTimeout(() => window.location.reload(), 1500);
            return;
          }

          const parsed = JSON.parse(customConfigInput);
          if (!parsed.apiKey || !parsed.projectId) {
            showNotification('Missing mandatory fields (apiKey, projectId).', 'error');
            return;
          }

          localStorage.setItem('solar_tracker_fb_config', JSON.stringify(parsed));
          localStorage.setItem('solar_tracker_app_id', customAppIdInput.trim() || 'bright-horizon-jpmc-inventory');
          
          showNotification('Firebase Configuration updated! Rebooting core...');
          setShowCloudModal(false);
          setTimeout(() => window.location.reload(), 1500);
        } catch (err) {
          showNotification('Invalid JSON object. Please paste valid configuration keys.', 'error');
        }
      };

      return (
        <div className={`min-h-screen flex flex-col font-sans antialiased transition-colors duration-300 ${currentBrand === 'jpmc' ? 'bg-[#060f1b]' : 'bg-slate-950'}`}>
          
          {/* Toast Notification Banner */}
          {toast && (
            <div className={`fixed top-5 right-5 z-50 flex items-center gap-3 p-4 rounded-xl border shadow-2xl animate-fade-in transition-all duration-300 max-w-sm
              ${toast.type === 'error' ? 'bg-red-950 border-red-800 text-red-200' : 'bg-emerald-950 border-emerald-800 text-emerald-200'}`}
            >
              <SVGIcon name={toast.type === 'error' ? "alert-triangle" : "check-circle"} className="w-5 h-5 shrink-0" />
              <p className="font-semibold text-sm">{toast.message}</p>
              <button onClick={() => setToast(null)} className="ml-auto text-slate-400 hover:text-white">
                <SVGIcon name="x" className="w-4 h-4" />
              </button>
            </div>
          )}

          {/* Dual-Branded Theme Swapping Strip */}
          <div className="bg-slate-900 border-b border-slate-800 text-xs py-2 px-4 sm:px-6 flex flex-col sm:flex-row justify-between items-center gap-3 text-slate-300">
            <div className="flex flex-wrap items-center justify-center sm:justify-start gap-3">
              <span>Active Profile:</span>
              <span className="font-bold text-white uppercase tracking-wider bg-slate-800 px-2.5 py-0.5 rounded text-[10px]">
                {currentBrand === 'jpmc' ? 'JPMC Solartech Philippines' : 'Bright Horizon Solar'}
              </span>
              
              {/* Dynamic Synchronization Status Indicator badge */}

                  <div className="bg-amber-500/10 border border-amber-500/30 rounded-lg p-3 text-xs text-amber-300 max-w-sm">
                    <span className="font-bold flex items-center gap-1"><SVGIcon name="flame" className="w-4 h-4" /> Promotion Details:</span>
                    Each package automatically pre-allocates corresponding bi-facial panels, matching hybrid inverter sizing, LFP storage, cabling rolls, and brackets.
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  {STANDARD_KITS.map(kit => {
                    const checkedItems = checkKitAvailability(kit);
                    const canDeploy = checkedItems.every(c => c.hasSufficient);
                    
                    return (
                      <div key={kit.id} className="bg-slate-900 border border-slate-800 rounded-xl p-5 flex flex-col justify-between hover:border-slate-700 transition-all relative overflow-hidden">
                        {/* Limited Offer label */}
                        <div className="absolute top-0 right-0 bg-[#e0a32e] text-slate-950 font-logo font-bold text-[9px] px-3 py-1 uppercase tracking-wider rounded-bl-lg shadow-md">
                          LIMITED OFFER
                        </div>

                        <div>
                          <div className="mb-3">
                            <span className="text-[10px] uppercase font-bold text-slate-500 tracking-wider">Bright Horizon Package</span>
                            <h3 className="text-xl font-black text-white font-logo mt-0.5">{kit.name}</h3>
                          </div>

                          {/* Promotional Pricing Box */}
                          <div className="bg-slate-950/70 border border-slate-800 p-3.5 rounded-lg mb-4 flex flex-col sm:flex-row justify-between sm:items-center gap-3">
                            <div>
                              <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Promotional Deal Price</p>
                              <div className="flex items-baseline gap-2 mt-1">
                                <span className="text-2xl font-extrabold text-red-500">₱{kit.promoPrice.toLocaleString()}</span>
                                <span className="text-xs text-slate-500 line-through">₱{kit.originalPrice.toLocaleString()}</span>
                              </div>
                            </div>
                            <div className="text-xs space-y-1 sm:text-right border-t sm:border-t-0 border-slate-800 pt-2 sm:pt-0">
                              <p className="text-emerald-400 font-bold">✓ potential savings: {kit.savings}</p>
                              <p className="text-slate-400">Monthly bill: <strong className="text-slate-200">{kit.electricBillRange}</strong></p>
                            </div>
                          </div>

                          <div className="space-y-1.5 mb-4">
                            <p className="text-xs font-semibold text-slate-400 flex items-center gap-1">
                              <SVGIcon name="info" className="w-3.5 h-3.5 text-amber-500" /> Package Inclusions:
                            </p>
                            <p className="text-xs text-slate-300 italic pl-1">{kit.inclusions}</p>
                          </div>
                          
                          <div className="space-y-2 border-t border-slate-800/60 pt-3 mb-4">
                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Live Warehouse Material Check:</p>
                            {checkedItems.map((kItem, index) => (
                              <div key={index} className="flex justify-between items-center text-xs">
                                <span className="text-slate-300 truncate max-w-[220px]" title={kItem.itemName}>
                                  {kItem.itemName}
                                </span>
                                <span className={`font-mono text-[11px] px-2 py-0.5 rounded ${kItem.hasSufficient ? 'text-slate-300 bg-slate-950' : 'text-red-400 bg-red-950/40 font-bold border border-red-900/20'}`}>
                                  Need {kItem.quantity} (Available: {kItem.available})
                                </span>
                              </div>
                            ))}
                          </div>
                        </div>

                        <button
                          onClick={() => handleDeployKit(kit)}
                          disabled={!canDeploy}
                          className={`w-full py-2.5 rounded-lg text-xs font-bold flex items-center justify-center gap-2 cursor-pointer transition-colors ${canDeploy ? 'bg-amber-500 hover:bg-amber-600 text-slate-950' : 'bg-slate-800 text-slate-500 cursor-not-allowed'}`}
                        >
                          <SVGIcon name="check-circle" className="w-4 h-4" />
                          {canDeploy ? 'Deploy Flyer Package to Site (Bulk Deduct)' : 'Cannot Deploy (Restock Required)'}
                        </button>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* --- REAL-TIME OPERATION HISTORY LOG --- */}
            {activeTab === 'history' && (
              <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 space-y-4">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                  <div>
                    <h2 className="text-lg font-semibold text-white">Consolidated Activity Logging</h2>
                    <p className="text-xs text-slate-400">All inbound shipments and onsite installation dispatches synchronized live across users</p>
                  </div>
                </div>

                {transactions.length === 0 ? (
                  <div className="text-center py-12 text-slate-500 border border-dashed border-slate-800 rounded-xl">
                    <SVGIcon name="file-text" className="w-12 h-12 mx-auto text-slate-700 mb-2" />
                    <p className="text-sm">No recorded transactions yet.</p>
                  </div>
                ) : (
                  <div className="divide-y divide-slate-800">
                    {transactions.map((tx) => {
                      const correlatedItem = inventory.find(i => i.sku === tx.sku);
                      return (
                        <div key={tx.id} className="py-3.5 flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                          <div className="flex items-start gap-3">
                            <div className={`p-2 rounded mt-0.5 ${tx.type === 'IN' ? 'bg-emerald-950/50 text-emerald-400 border border-emerald-900/50' : 'bg-red-950/50 text-red-400 border border-red-900/50'}`}>
                              {tx.type === 'IN' ? (
                                <span className="flex items-center gap-1 text-xs font-bold"><SVGIcon name="arrow-down-left" className="w-4 h-4" /> IN</span>
                              ) : (
                                <span className="flex items-center gap-1 text-xs font-bold"><SVGIcon name="arrow-up-right" className="w-4 h-4" /> OUT</span>
                              )}
                            </div>
                            <div>
                              <p className="font-semibold text-slate-200">
                                {correlatedItem ? `${correlatedItem.brand} - ${correlatedItem.name}` : tx.sku}
                              </p>
                              <div className="flex flex-wrap items-center gap-2 text-xs text-slate-400 mt-1">
                                <span className="font-mono bg-slate-800 px-1.5 py-0.5 rounded text-[10px] text-slate-300">{tx.sku}</span>
                                <span>•</span>
                                <span className="text-slate-300">Quantity: <strong className="text-white">{tx.quantity}</strong></span>
                                <span>•</span>
                                <span className="italic">Note: "{tx.note}"</span>
                              </div>
                            </div>
                          </div>
                          <div className="text-right shrink-0">
                            <p className="text-xs text-slate-500">{tx.date}</p>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

          </main>

          {/* --- DIALOG MODALS --- */}

          {/* 1. Cloud Database Connection Setup (Allows zero-config GitHub deploys) */}
          {showCloudModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/85 backdrop-blur-sm animate-fade-in">
              <div className="bg-slate-900 border border-slate-800 rounded-xl max-w-lg w-full overflow-hidden shadow-2xl">
                <div className="bg-slate-950 px-6 py-4 border-b border-slate-800 flex items-center justify-between">
                  <h3 className="font-bold text-white text-lg flex items-center gap-2">
                    <SVGIcon name="settings" className="w-5 h-5 text-amber-500 animate-spin-slow" /> Connect Your Own Live Cloud
                  </h3>
                  <button onClick={() => setShowCloudModal(false)} className="text-slate-400 hover:text-white cursor-pointer">
                    <SVGIcon name="x" className="w-5 h-5" />
                  </button>
                </div>

                <form onSubmit={handleSaveCloudSettings} className="p-6 space-y-4 text-xs">
                  <div className="bg-slate-950 p-4 rounded-lg border border-slate-800 space-y-2 text-slate-300">
                    <p className="font-bold text-amber-400">🚀 Deploying to GitHub Pages?</p>
                    <p className="leading-relaxed">
                      To make this system live across multiple devices, create a free project at 
                      <strong className="text-white"> Firebase Console</strong>, enable <strong className="text-white">Firestore Database & Anonymous Auth</strong>, and paste your SDK Web Config object JSON below.
                    </p>
                  </div>

                  <div className="space-y-1.5">
                    <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider block">Firebase App Configuration (JSON)</label>
                    <textarea 
                      rows="7"
                      placeholder='{&#10;  "apiKey": "AIzaSy...",&#10;  "authDomain": "...",&#10;  "projectId": "...",&#10;  "appId": "..."&#10;}'
                      value={customConfigInput}
                      onChange={(e) => setCustomConfigInput(e.target.value)}
                      className="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 text-mono text-xs text-slate-200 focus:outline-none focus:border-amber-500 font-mono"
                    />
                  </div>

                  <div className="space-y-1.5">
                    <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider block">App Namespace (App ID)</label>
                    <input 
                      type="text"
                      placeholder="e.g. bright-horizon-jpmc-inventory"
                      value={customAppIdInput}
                      onChange={(e) => setCustomAppIdInput(e.target.value)}
                      className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-amber-500"
                    />
                    <span className="text-[10px] text-slate-500">Separates distinct datasets so you can run multiple independent installations.</span>
                  </div>

                  <div className="flex gap-3 justify-end pt-4 border-t border-slate-800">
                    <button 
                      type="button" 
                      onClick={() => {
                        setCustomConfigInput('');
                        localStorage.removeItem('solar_tracker_fb_config');
                        localStorage.removeItem('solar_tracker_app_id');
                        showNotification('Reset to defaults requested. Reloading...');
                        setTimeout(() => window.location.reload(), 1500);
                      }}
                      className="px-3 py-2 text-xs font-semibold text-red-400 hover:text-red-300 transition-colors mr-auto"
                    >
                      Disconnect & Run Local
                    </button>
                    <button 
                      type="button" 
                      onClick={() => setShowCloudModal(false)}
                      className="px-4 py-2 text-xs font-semibold text-slate-400 hover:text-white transition-colors"
                    >
                      Cancel
                    </button>
                    <button 
                      type="submit"
                      className="bg-amber-500 hover:bg-amber-600 text-slate-950 px-5 py-2 rounded-lg text-xs font-bold transition-colors"
                    >
                      Save & Re-Initialize
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* 2. Add Product catalog modal */}
          {showAddModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/85 backdrop-blur-sm animate-fade-in">
              <div className="bg-slate-900 border border-slate-800 rounded-xl max-w-lg w-full overflow-hidden shadow-2xl">
                <div className="bg-slate-950 px-6 py-4 border-b border-slate-800 flex items-center justify-between">
                  <h3 className="font-bold text-white text-lg flex items-center gap-2">
                    <SVGIcon name="plus" className="w-5 h-5 text-amber-500" /> Catalog New Solar Component
                  </h3>
                  <button onClick={() => setShowAddModal(false)} className="text-slate-400 hover:text-white cursor-pointer">
                    <SVGIcon name="x" className="w-5 h-5" />
                  </button>
                </div>

                <form onSubmit={handleAddNewItem} className="p-6 space-y-4">
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div className="sm:col-span-2 space-y-1">
                      <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Item/Product Name *</label>
                      <input 
                        type="text"
                        required
                        placeholder="e.g. DL50C LFP Storage Wall Battery"
                        value={newItem.name}
                        onChange={(e) => setNewItem(prev => ({ ...prev, name: e.target.value }))}
                        className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-amber-500"
                      />
                    </div>

                    <div className="space-y-1">
                      <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">SKU Code (Unique) *</label>
                      <input 
                        type="text"
                        required
                        placeholder="e.g. BAT-DYNESS-5KWH"
                        value={newItem.sku}
                        onChange={(e) => setNewItem(prev => ({ ...prev, sku: e.target.value }))}
                        className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-amber-500"
                      />
                    </div>

                    <div className="space-y-1">
                      <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Manufacturer Brand *</label>
                      <select
                        value={newItem.brand}
                        onChange={(e) => setNewItem(prev => ({ ...prev, brand: e.target.value }))}
                        className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-amber-500"
                      >
                        {PARTNER_BRANDS.map(brand => (
                          <option key={brand} value={brand}>{brand}</option>
                        ))}
                      </select>
                    </div>

                    <div className="space-y-1">
                      <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Category *</label>
                      <select
                        value={newItem.category}
                        onChange={(e) => setNewItem(prev => ({ ...prev, category: e.target.value }))}
                        className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-amber-500"
                      >
                        {CATEGORIES.slice(1).map(cat => (
                          <option key={cat} value={cat}>{cat}</option>
                        ))}
                      </select>
                    </div>

                    <div className="space-y-1">
                      <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Starting Stock Qty *</label>
                      <input 
                        type="number"
                        required
                        min="0"
                        placeholder="e.g. 50"
                        value={newItem.quantity}
                        onChange={(e) => setNewItem(prev => ({ ...prev, quantity: e.target.value }))}
                        className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-amber-500"
                      />
                    </div>

                    <div className="space-y-1">
                      <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Min Threshold Warning *</label>
                      <input 
                        type="number"
                        required
                        min="1"
                        placeholder="e.g. 10"
                        value={newItem.minThreshold}
                        onChange={(e) => setNewItem(prev => ({ ...prev, minThreshold: e.target.value }))}
                        className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-amber-500"
                      />
                    </div>

                    <div className="space-y-1">
                      <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Unit of Measure</label>
                      <input 
                        type="text"
                        placeholder="e.g. pcs, rolls, sets"
                        value={newItem.unit}
                        onChange={(e) => setNewItem(prev => ({ ...prev, unit: e.target.value }))}
                        className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-amber-500"
                      />
                    </div>

                    <div className="space-y-1">
                      <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Unit Cost (₱ PHP) *</label>
                      <input 
                        type="number"
                        step="1"
                        required
                        placeholder="e.g. 78000"
                        value={newItem.price}
                        onChange={(e) => setNewItem(prev => ({ ...prev, price: e.target.value }))}
                        className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-amber-500"
                      />
                    </div>

                    <div className="sm:col-span-2 space-y-1">
                      <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Warehouse Location / Shelf Bin</label>
                      <input 
                        type="text"
                        placeholder="e.g. Aisle A-1, Bin B-10"
                        value={newItem.location}
                        onChange={(e) => setNewItem(prev => ({ ...prev, location: e.target.value }))}
                        className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-amber-500"
                      />
                    </div>
                  </div>

                  <div className="flex gap-3 justify-end pt-4 border-t border-slate-800">
                    <button 
                      type="button" 
                      onClick={() => setShowAddModal(false)}
                      className="px-4 py-2 text-sm font-semibold text-slate-400 hover:text-white transition-colors cursor-pointer"
                    >
                      Cancel
                    </button>
                    <button 
                      type="submit"
                      className="bg-amber-500 hover:bg-amber-600 text-slate-950 px-5 py-2 rounded-lg text-sm font-bold transition-colors cursor-pointer"
                    >
                      Register Component
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* 3. Adjust Stock Modal */}
          {showTransactionModal && selectedItemForTx && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/85 backdrop-blur-sm animate-fade-in">
              <div className="bg-slate-900 border border-slate-800 rounded-xl max-w-md w-full overflow-hidden shadow-2xl">
                <div className="bg-slate-950 px-6 py-4 border-b border-slate-800 flex items-center justify-between">
                  <h3 className="font-bold text-white text-base">
                    Stock Adjustment: {selectedItemForTx.sku}
                  </h3>
                  <button onClick={() => setShowTransactionModal(false)} className="text-slate-400 hover:text-white cursor-pointer">
                    <SVGIcon name="x" className="w-5 h-5" />
                  </button>
                </div>

                <div className="p-4 bg-slate-850 text-slate-300 text-xs flex justify-between border-b border-slate-800">
                  <span>Item: <strong className="text-white">{selectedItemForTx.name}</strong></span>
                  <span>Available: <strong className="text-amber-400">{selectedItemForTx.quantity} {selectedItemForTx.unit}</strong></span>
                </div>

                <form onSubmit={handleTransactionSubmit} className="p-6 space-y-4">
                  
                  {/* Type toggle */}
                  <div className="space-y-1">
                    <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-2">Direction of Inventory Flow</label>
                    <div className="grid grid-cols-2 gap-2">
                      <button
                        type="button"
                        onClick={() => setTxType('IN')}
                        className={`py-2 rounded-lg text-xs font-bold flex items-center justify-center gap-2 border transition-all ${txType === 'IN' ? 'bg-emerald-950/80 border-emerald-500 text-emerald-400' : 'bg-slate-950 border-slate-800 text-slate-400'}`}
                      >
                        <SVGIcon name="arrow-down-left" className="w-4 h-4" /> Stock Intake (Add)
                      </button>
                      <button
                        type="button"
                        onClick={() => setTxType('OUT')}
                        className={`py-2 rounded-lg text-xs font-bold flex items-center justify-center gap-2 border transition-all ${txType === 'OUT' ? 'bg-red-950/80 border-red-500 text-red-400' : 'bg-slate-950 border-slate-800 text-slate-400'}`}
                      >
                        <SVGIcon name="arrow-up-right" className="w-4 h-4" /> Issue/Deduct (Out)
                      </button>
                    </div>
                  </div>

                  {/* Quantity input */}
                  <div className="space-y-1">
                    <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Adjustment Quantity ({selectedItemForTx.unit})</label>
                    <input 
                      type="number"
                      required
                      min="1"
                      placeholder="e.g. 10"
                      value={txQuantity}
                      onChange={(e) => setTxQuantity(e.target.value)}
                      className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-amber-500"
                    />
                  </div>

                  {/* Note input */}
                  <div className="space-y-1">
                    <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Activity Description / Project Allocation</label>
                    <input 
                      type="text"
                      placeholder="e.g. Quezon City site construction"
                      value={txNote}
                      onChange={(e) => setTxNote(e.target.value)}
                      className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-amber-500"
                    />
                  </div>

                  <div className="flex gap-3 justify-end pt-4 border-t border-slate-800">
                    <button 
                      type="button" 
                      onClick={() => setShowTransactionModal(false)}
                      className="px-4 py-2 text-sm font-semibold text-slate-400 hover:text-white transition-colors cursor-pointer"
                    >
                      Cancel
                    </button>
                    <button 
                      type="submit"
                      className={`px-5 py-2 rounded-lg text-sm font-bold transition-all text-slate-950 cursor-pointer ${txType === 'IN' ? 'bg-emerald-500 hover:bg-emerald-600' : 'bg-red-500 hover:bg-red-600'}`}
                    >
                      {txType === 'IN' ? 'Increase Stock Level' : 'Deduct Stock Level'}
                    </button>
                  </div>

                </form>
              </div>
            </div>
          )}

          {/* Footer Branding */}
          <footer className="border-t border-slate-800 bg-slate-950/80 text-slate-500 py-6 text-center text-xs space-y-2 mt-auto">
            <p>© 2026 Bright Horizon & JPMC Solartech. All Rights Reserved.</p>
            <p className="text-[11px] text-slate-600">Enterprise Logistics Storage Module • Sandbox Simulator Mode Active</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
